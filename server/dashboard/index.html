<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Windows Soft Inventory</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Windows Soft Inventory</h1>
      <p id="generatedAt">Waiting for inventory data.</p>
    </div>
    <input id="searchInput" type="search" placeholder="Filter computers, OS, Office, software">
  </header>

  <main>
    <nav class="tabs" aria-label="Dashboard views">
      <button id="clientsTab" class="tab active" type="button">Clients</button>
      <button id="softwareTab" class="tab" type="button">Software</button>
      <button id="installTab" class="tab" type="button">Client actions</button>
    </nav>

    <section id="installView" class="install-panel hidden" aria-label="Remote client actions">
      <div class="install-grid">
        <label class="install-action-field">
          Action
          <select id="clientAction">
            <option value="install">Install client</option>
            <option value="uninstall">Uninstall client</option>
          </select>
        </label>
        <label class="install-targets-field">
          Targets
          <textarea id="installTargets" rows="4" placeholder="PC-001&#10;PC-002&#10;192.0.2.10&#10;192.0.2.20-192.0.2.30"></textarea>
        </label>
        <label class="install-server-field install-only">
          Server URL
          <input id="installServerUrl" type="text" value="">
        </label>
        <label class="install-user-field">
          WinRM user
          <input id="installUsername" type="text" autocomplete="username" placeholder="DOMAIN\User">
        </label>
        <label class="install-password-field">
          WinRM password
          <input id="installPassword" type="password" autocomplete="current-password">
        </label>
        <label class="check-label install-force-field install-only">
          <input id="installForce" type="checkbox">
          Force reinstall
        </label>
        <label class="check-label install-trusted-field">
          <input id="installTrustedHosts" type="checkbox">
          Add to TrustedHosts
        </label>
        <label class="install-retention-field">
          Log retention days
          <input id="installRetentionDays" type="number" min="1" max="3650" value="30">
        </label>
        <button id="installButton" class="primary-button" type="button">Install client</button>
      </div>
      <div id="installStatus" class="install-status empty">No install job started.</div>
      <div id="installHistory" class="install-history empty">No saved client action logs.</div>
    </section>

    <section class="summary" aria-label="Inventory summary">
      <div><span id="clientCount">0</span><small>Clients</small></div>
      <div><span id="windowsActivated">0</span><small>Windows activated</small></div>
      <div><span id="officeActivated">0</span><small>Office activated</small></div>
      <div><span id="staleCount">0</span><small>Stale &gt;48h</small></div>
    </section>

    <section id="clientsView" class="table-wrap" aria-label="Client inventory">
      <table>
        <thead>
          <tr>
            <th>Computer</th>
            <th>Client</th>
            <th>OS</th>
            <th>Office</th>
            <th>Windows</th>
            <th>Office activation</th>
            <th>Software</th>
            <th>Collected</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventoryBody"></tbody>
      </table>
    </section>

    <section id="softwareView" class="table-wrap hidden" aria-label="Software inventory">
      <table>
        <thead>
          <tr>
            <th>Software</th>
            <th>Version</th>
            <th>Publisher</th>
            <th>Installations</th>
            <th>Computers</th>
          </tr>
        </thead>
        <tbody id="softwareBody"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
