<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Windows Soft Inventory</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Windows Soft Inventory</h1>
      <p id="generatedAt">Waiting for inventory data.</p>
    </div>
    <input id="searchInput" type="search" placeholder="Filter computers, OS, Office, software">
  </header>

  <main>
    <nav class="tabs" aria-label="Dashboard views">
      <button id="clientsTab" class="tab active" type="button">Clients</button>
      <button id="softwareTab" class="tab" type="button">Software</button>
    </nav>

    <section class="summary" aria-label="Inventory summary">
      <div><span id="clientCount">0</span><small>Clients</small></div>
      <div><span id="windowsActivated">0</span><small>Windows activated</small></div>
      <div><span id="officeActivated">0</span><small>Office activated</small></div>
      <div><span id="staleCount">0</span><small>Stale &gt;48h</small></div>
    </section>

    <section id="clientsView" class="table-wrap" aria-label="Client inventory">
      <table>
        <thead>
          <tr>
            <th>Computer</th>
            <th>Client</th>
            <th>OS</th>
            <th>Office</th>
            <th>Windows</th>
            <th>Office activation</th>
            <th>Software</th>
            <th>Collected</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventoryBody"></tbody>
      </table>
    </section>

    <section id="softwareView" class="table-wrap hidden" aria-label="Software inventory">
      <table>
        <thead>
          <tr>
            <th>Software</th>
            <th>Version</th>
            <th>Publisher</th>
            <th>Installations</th>
            <th>Computers</th>
          </tr>
        </thead>
        <tbody id="softwareBody"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
